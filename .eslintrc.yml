env:
  browser: true
  es2021: true
  node: true
extends:
  - airbnb-base
  - plugin:import/typescript
  - "plugin:@typescript-eslint/eslint-recommended"
  - "plugin:@typescript-eslint/recommended"
  - plugin:react/recommended
  - plugin:react/jsx-runtime
parser: '@typescript-eslint/parser'
parserOptions:
  ecmaVersion: latest
  sourceType: module
plugins:
  - '@typescript-eslint'
  - react
settings:
  react:
    version: detect
ignorePatterns:
  - dist
  - node_modules
rules:
  max-len: [error, {code: 120, ignoreStrings: true, ignoreTemplateLiterals: true, ignoreComments: true}]
  '@typescript-eslint/type-annotation-spacing': [error, {before: true, after: true, overrides: {colon: {before: false, after: true}}}]
  '@typescript-eslint/member-delimiter-style': [error, {multiline: {delimiter: semi}}]
  no-param-reassign: off
  react/prop-types: off
  import/extensions:
      ['error', 'ignorePackages', {'js': 'never', 'jsx': 'never', 'ts': 'never', 'tsx': 'never'}]
